name: Yerel Lider AI Günlük Tarama

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri yükle
        run: pip install -r requirements.txt

      - name: Günlük raporu üret
        run: python app.py

      - name: Raporu repoya kaydet
        run: |
          git config user.name "yerel-lider-ai-bot"
          git config user.email "bot@example.com"
          git push --force-with-lease
          git add reports/daily_report.html data/dynamic_keywords.txt
          git commit -m "Günlük rapor güncellendi" || echo "Değişiklik yok"
          git push
