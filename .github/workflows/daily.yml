name: Daily Yerel Lider AI Report

on:
  schedule:
    # Türkiye saatiyle 09:00 - 23:30 arası 30 dakikada bir çalışır
    # GitHub cron UTC çalışır. Türkiye UTC+3 olduğu için 06:00 UTC = 09:00 TR
    - cron: "0,30 6-20 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerekli paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Raporu oluştur
        run: |
          python app.py

      - name: Raporu repoya kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/ data/dynamic_keywords.txt
          git commit -m "Yerel Lider AI raporu güncellendi" || echo "Değişiklik yok"
          git push
