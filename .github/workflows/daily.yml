name: Daily Yerel Lider AI Report

on:
  schedule:
    # Türkiye saati 09:10 için 06:10 UTC
    - cron: "10 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerekli paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Raporu oluştur
        run: |
          python app.py

      - name: Raporu repoya kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/ data/dynamic_keywords.txt
          git commit -m "Günlük Yerel Lider AI raporu güncellendi" || echo "Değişiklik yok"
          git push
