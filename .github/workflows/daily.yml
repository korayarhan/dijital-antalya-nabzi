name: Yerel Lider AI Günlük Tarama

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sistem paketlerini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf

      - name: Python paketlerini yükle
        run: pip install -r requirements.txt

      - name: Günlük raporu üret
        run: python app.py

      - name: HTML raporu PDF yap
        run: |
          mkdir -p reports
          wkhtmltopdf reports/daily_report.html reports/daily_report.pdf

      - name: Raporu mail gönder
        continue-on-error: true
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python send_report.py

      - name: Raporu repoya kaydet
        run: |
          git config user.name "yerel-lider-ai-bot"
          git config user.email "bot@example.com"
          git add reports/daily_report.html reports/daily_report.pdf data/dynamic_keywords.txt
          git commit -m "Günlük rapor güncellendi" || echo "Değişiklik yok"
          git push --force-with-lease
